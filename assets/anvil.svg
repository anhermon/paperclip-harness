<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none">
  <!--
    anvil — provider-agnostic Rust AI agent runtime
    Clean geometric blacksmith's anvil silhouette, side view.
    Deep navy fill (#1a1a2e). Compound path: horn + face + body + waist + feet.
  -->

  <!-- Left foot -->
  <rect x="12" y="66" width="30" height="10" rx="2" fill="#1a1a2e"/>

  <!-- Right foot -->
  <rect x="78" y="66" width="30" height="10" rx="2" fill="#1a1a2e"/>

  <!-- Waist — trapezoid connecting body to feet -->
  <path d="M24 56 L96 56 L88 66 L32 66 Z" fill="#1a1a2e"/>

  <!-- Body — main table platform -->
  <path d="M14 40 L106 40 L106 48 L96 56 L24 56 L14 48 Z" fill="#1a1a2e"/>

  <!-- Hardy hole — square punch-through in table surface -->
  <rect x="89" y="41" width="9" height="8" rx="1" fill="#f4f4f8"/>

  <!-- Horn — tapered left projection -->
  <path d="M14 40 L14 48 L1 45 Z" fill="#1a1a2e"/>

  <!-- Work face — flat top surface -->
  <rect x="13" y="35" width="94" height="5" rx="1.5" fill="#1a1a2e"/>
</svg>
