<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!--
    Anvil — icon + wordmark lockup
    Left zone (0–70): icon with dark bg + ember glow
    Divider at x=72
    Right zone (80–260): geometric sans-serif wordmark "anvil"
  -->
  <defs>
    <!-- Icon background -->
    <radialGradient id="lk-bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%"   stop-color="#272727"/>
      <stop offset="100%" stop-color="#151515"/>
    </radialGradient>
    <!-- Steel -->
    <linearGradient id="lk-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7a7a7a"/>
      <stop offset="45%"  stop-color="#585858"/>
      <stop offset="100%" stop-color="#363636"/>
    </linearGradient>
    <!-- Work face -->
    <linearGradient id="lk-face" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#636363"/>
      <stop offset="40%"  stop-color="#8a8a8a"/>
      <stop offset="60%"  stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#636363"/>
    </linearGradient>
    <!-- Ember gradient -->
    <linearGradient id="lk-ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#b03000" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#ff5500"/>
      <stop offset="50%"  stop-color="#ff7200"/>
      <stop offset="85%"  stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#b03000" stop-opacity="0"/>
    </linearGradient>
    <!-- Ember glow filter (tight, for small icon) -->
    <filter id="lk-glow" x="-30%" y="-600%" width="160%" height="1400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ambient halo (large soft glow behind body) -->
    <filter id="lk-halo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <!-- Particle glow -->
    <filter id="lk-ptcl" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
    <!-- Clip icon to rounded square -->
    <clipPath id="lk-clip">
      <rect x="4" y="4" width="62" height="72" rx="14"/>
    </clipPath>
  </defs>

  <!-- === ICON (62×72 rounded square, top-left offset 4,4) === -->
  <rect x="4" y="4" width="62" height="72" rx="14" fill="url(#lk-bg)"/>
  <g clip-path="url(#lk-clip)">
    <!-- Ambient orange halo above work face (behind body) -->
    <ellipse cx="36" cy="24" rx="22" ry="7"
             fill="#ff5500" opacity="0.35" filter="url(#lk-halo)"/>
    <!-- Main body: bezier waist + two feet as single compound path -->
    <path d="
      M 18,32 L 57,32 L 57,37
      C 55,37 53,39 52,43
      L 51,49 L 55,55 L 55,62
      L 40,62 L 39,56 L 32,56
      L 31,62 L 16,62 L 16,55
      L 20,49 L 19,43
      C 18,39 16,37 14,37
      L 14,32 Z
    " fill="url(#lk-steel)"/>
    <!-- Horn: bezier tapered arm — extends to x=4 (≥25% of total width) -->
    <path d="
      M 14,32 L 18,32 L 18,37
      C 15,37 12,37 12,37
      C 9,37 4,35 4,33
      C 4,31 9,28 14,32 Z
    " fill="url(#lk-steel)"/>
    <!-- Work face: flat top surface -->
    <rect x="14" y="27" width="43" height="5" rx="1.2" fill="url(#lk-face)"/>
    <!-- Hardy hole: square socket near right of face -->
    <rect x="52" y="28.5" width="4.5" height="4" rx="0.6"
          fill="#1e1e1e" opacity="0.85"/>
    <!-- Secondary ambient glow above face -->
    <rect x="11" y="22" width="46" height="7" rx="2.5"
          fill="#ff5500" opacity="0.40" filter="url(#lk-halo)"/>
    <!-- Crisp ember line on top edge of work face -->
    <rect x="14" y="24" width="43" height="3" rx="1.5"
          fill="url(#lk-ember)" filter="url(#lk-glow)"/>
    <!-- Heat particles rising above the forge -->
    <g filter="url(#lk-ptcl)" opacity="0.55">
      <circle cx="22" cy="18" r="1.8" fill="#ff6a00"/>
      <circle cx="35" cy="14" r="1.5" fill="#ffa000"/>
      <circle cx="48" cy="17" r="1.8" fill="#ff7500"/>
    </g>
  </g>

  <!-- Divider -->
  <line x1="74" y1="14" x2="74" y2="66"
        stroke="currentColor" stroke-width="1.2"
        stroke-linecap="round" opacity="0.18"/>

  <!-- === WORDMARK: "anvil" ===
       Geometric stroke-based letterforms.
       Cap height: 26px. Baseline: y=56. Start: x=84.
       Stroke: width=3.8, round caps+joins.
  -->
  <g stroke="currentColor" stroke-width="3.8"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- a: open circular bowl (left side open at top-right) + right stem -->
    <path d="M97 46 A9 9 0 1 0 97 48"/>
    <line x1="97" y1="37" x2="97" y2="56"/>

    <!-- n: left stem + arch + right stem -->
    <line x1="108" y1="37" x2="108" y2="56"/>
    <path d="M108 42 C108 35 115 35 115 35 C122 35 122 42 122 42 L122 56"/>

    <!-- v: two converging legs -->
    <polyline points="129,36 136,56 143,36"/>

    <!-- i: stem + dot -->
    <line x1="151" y1="43" x2="151" y2="56"/>
    <circle cx="151" cy="34" r="2.2" fill="currentColor" stroke="none"/>

    <!-- l: tall stem -->
    <line x1="160" y1="22" x2="160" y2="56"/>

  </g>
</svg>
